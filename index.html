<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="index,follow" />
    <title>Max Ilcesin | Landing Page</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="profile-card" aria-label="Profile landing page">
        <div class="hero-glow hero-glow-left" aria-hidden="true"></div>
        <div class="hero-glow hero-glow-right" aria-hidden="true"></div>

        <header class="hero-section">
          <div class="portrait-ring">
            <img
              src="./photo.jpg"
              alt="Profile photo of Max Ilcesin"
              width="144"
              height="144"
              class="avatar-image"
            />
          </div>
          <h1 class="display-name">Max Ilcesin</h1>
        </header>

        <section class="about-section" aria-labelledby="about-heading">
          <div class="section-heading-row">
            <h2 id="about-heading">About</h2>
          </div>
          <div class="about-panel">
            <p class="primary-line">Mechanical &amp; Mechatronic Engineering</p>
            <p class="secondary-line">UTS | 4th Year</p>
            <p class="primary-line role-line">Engineering Support Officer</p>
            <p class="secondary-line">QinetiQ Australia</p>
          </div>
        </section>

        <section class="actions-section" aria-label="Contact actions">
          <div class="section-heading-row">
            <h2>Connect</h2>
          </div>
          <a
            id="linkedinBtn"
            href="linkedin://in/maximus-ilcesin"
            target="_blank"
            rel="noopener"
            class="action-button action-linkedin"
          >
            <span class="action-copy">
              <span class="action-title">LinkedIn</span>
            </span>
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
            </span>
          </a>

          <a
            id="emailBtn"
            href="mailto:max.ilcesin@gmail.com"
            class="action-button action-email"
          >
            <span class="action-copy">
              <span class="action-title">Email</span>
            </span>
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="M3 7l9 6 9-6"></path>
              </svg>
            </span>
          </a>

          <a
            id="vcardLink"
            href="MaximusIlcesin.vcf"
            download="MaximusIlcesin.vcf"
            class="action-button action-contact"
            aria-label="Save contact"
          >
            <span class="action-copy">
              <span class="action-title">Save Contact</span>
            </span>
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
                <circle cx="9.5" cy="7" r="4"></circle>
                <path d="M20 8v6"></path>
                <path d="M17 11h6"></path>
              </svg>
            </span>
          </a>
        </section>
      </section>
    </main>
  </body>
</html>
